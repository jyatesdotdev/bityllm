<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>bity — a hallucinated terminal</title>
  <link rel="icon" type="image/svg+xml" href="bity.svg" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #0a0f0a;
      display: flex; flex-direction: column; align-items: center;
      font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    }
    header { color: #3a5f3a; font-size: 12px; padding: 10px 0 0; user-select: none; }
    header b { color: #62c462; }
    #crt {
      width: min(920px, 96vw); height: min(560px, 72vh);
      margin: 12px 0 18px; padding: 18px 20px;
      background: radial-gradient(ellipse at center, #0d1a0d 0%, #081008 100%);
      border: 1px solid #1d3a1d; border-radius: 10px;
      box-shadow: 0 0 44px rgba(64, 224, 64, 0.09), inset 0 0 60px rgba(0,0,0,0.55);
      overflow-y: auto; cursor: text;
    }
    #screen {
      margin: 0; color: #62c462; font-size: 13px; line-height: 1.42;
      white-space: pre-wrap; word-break: break-all;
      text-shadow: 0 0 6px rgba(98, 196, 98, 0.35);
    }
    #cursor { display: inline-block; width: 8px; height: 15px; background: #62c462;
      vertical-align: text-bottom; animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    footer { color: #274427; font-size: 11px; padding-bottom: 14px; user-select: none; }
  </style>
</head>
<body>
  <header>bity — <b>a hallucinated terminal</b> · every byte below is dreamed by a tiny LLM running in your tab · try <b>help</b>, <b>ping bity.dev</b>, <b>fortune</b>, <b>reboot</b></header>
  <div id="crt"><pre id="screen"></pre><span id="cursor"></span></div>
  <footer>bityllm · pure TypeScript · zero dependencies · trained from scratch on this machine</footer>
  <script type="module" src="./dist/examples/web/terminal.js"></script>
</body>
</html>
